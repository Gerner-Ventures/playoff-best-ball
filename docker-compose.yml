services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: pbb
      POSTGRES_PASSWORD: pbb
      POSTGRES_DB: pbb_dev
    ports:
      # 5434 on the host: 5432 is commonly taken by other local projects
      - "5434:5432"
    volumes:
      - pbb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbb"]
      interval: 2s
      timeout: 3s
      retries: 15
  db-test:
    image: postgres:17
    environment:
      POSTGRES_USER: pbb
      POSTGRES_PASSWORD: pbb
      POSTGRES_DB: pbb_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbb"]
      interval: 2s
      timeout: 3s
      retries: 15
volumes:
  pbb_pgdata:
